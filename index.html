<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaQuran | البوت الإسلامي المتكامل</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="main-wrapper">
        <header>
            <div class="logo-area">
                <i class="fa-solid fa-book-quran main-logo"></i>
                <h1>DiaQuran</h1>
            </div>
            <p class="subtitle">الرفيق الإسلامي الأمثل لخادمك في ديسكورد</p>
        </header>

        <section class="cta-section">
            <a href="https://discord.com/oauth2/authorize?client_id=1505810535428390982&permissions=8&integration_type=0&scope=bot+applications.commands" target="_blank" class="btn btn-primary">
                <i class="fa-brands fa-discord"></i> إضافة البوت للسيرفر
            </a>
            <a href="#features" class="btn btn-secondary">
                <i class="fa-solid fa-compass"></i> استكشف الميزات
            </a>
        </section>

        <section class="stats-container">
            <div class="stat-card">
                <h3 id="servers-count">0</h3>
                <p>خادم نشط</p>
            </div>
            <div class="stat-card">
                <h3 id="users-count">0</h3>
                <p>مستخدم مستفيد</p>
            </div>
            <div class="stat-card">
                <h3>24/7</h3>
                <p>تشغيل دون انقطاع</p>
            </div>
        </section>

        <div class="stat-card" id="status-card">
            <h3 id="bot-status">...</h3>
            <p id="status-text">جاري التحقق...</p>
        </div>

        <section id="features" class="features-section">
            <h2>ماذا يقدم DiaQuran؟</h2>
            <div class="features-grid">
                </div>
        </section>

        <footer>
            <p>صنع بكل حب ليخدم الأمة الإسلامية © 2026 DiaQuran</p>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
