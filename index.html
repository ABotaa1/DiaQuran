<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>DiaQuran | الرفيق الإسلامي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #fff; background-image: radial-gradient(circle at 50% -20%, #1a160d 0%, #050505 80%); }
    .text-gold { color: #D4AF37; }
    .card-luxury { background: rgba(10, 10, 10, 0.6); border: 1px solid #222; transition: all 0.5s ease; }
    .card-luxury:hover { border-color: #D4AF37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #AA8C2C 100%); color: #000; font-weight: 900; transition: 0.3s; }
    .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
  </style>
</head>
<body class="min-h-screen pb-20">

  <nav class="max-w-6xl mx-auto p-8 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="text-3xl font-black italic tracking-tighter">Dia<span class="text-gold">Quran</span></div>
    </div>
    <div class="flex gap-2 bg-[#111] p-1 rounded-full border border-[#222]">
      <button class="bg-[#222] px-6 py-2 rounded-full font-bold text-sm">العربية</button>
      <button class="px-6 py-2 rounded-full text-gray-500 text-sm hover:text-white transition">EN</button>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto text-center py-10 px-6">
    <h1 class="text-6xl md:text-8xl font-black mb-8">الرفيق <span class="text-gold">الإسلامي</span><br>في سيرفرك</h1>
    <p class="text-gray-400 text-xl mb-12 max-w-lg mx-auto">تلاوات، أذكار، وخدمات إسلامية متكاملة بأعلى معايير الجودة والأناقة.</p>
    
    <a href="https://discord.com/oauth2/authorize?client_id=1505810535428390982&permissions=8&integration_type=0&scope=bot+applications.commands" 
       class="btn-gold px-12 py-5 rounded-2xl text-lg inline-block shadow-xl">إضافة البوت إلى السيرفر</a>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-24 mb-24 max-w-3xl mx-auto">
      <div class="card-luxury p-6 rounded-2xl">
        <div id="serverCount" class="text-3xl font-black text-gold mb-1">0</div>
        <div class="text-xs text-gray-500 uppercase tracking-widest">خادم نشط</div>
      </div>

      <div class="card-luxury p-6 rounded-2xl flex flex-col items-center justify-center border-gold/30">
        <div class="flex items-center gap-2 mb-2">
          <div id="statusIndicator" class="w-3 h-3 bg-gray-500 rounded-full"></div>
          <span id="statusText" class="text-sm font-bold text-gray-400">جاري الاتصال...</span>
        </div>
        <div class="text-xs text-gray-500 uppercase tracking-widest">حالة البوت</div>
      </div>
      
      <div class="card-luxury p-6 rounded-2xl">
        <div id="userCount" class="text-3xl font-black text-gold mb-1">0</div>
        <div class="text-xs text-gray-500 uppercase tracking-widest">مستخدم مستفيد</div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://diaqurann-default-rtdb.firebaseio.com/" };
    const db = getDatabase(initializeApp(firebaseConfig));

    // دالة محسنة للعد التصاعدي تبدأ من 0 لكل عنصر
    function animateCounter(id, target) {
      const element = document.getElementById(id);
      const duration = 2000; // 2 ثانية
      const start = 0;
      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const current = Math.floor(progress * target);
        
        element.innerText = current.toLocaleString() + '+';
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      requestAnimationFrame(update);
    }

    onValue(ref(db, 'bot_stats'), (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // تشغيل الأنيميشن لكل عداد
        animateCounter('serverCount', data.servers);
        animateCounter('userCount', data.users);
        
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        
        if (data.status === 'online') {
          statusText.innerText = 'يعمل';
          statusText.className = 'text-sm font-bold text-green-500';
          statusIndicator.className = 'w-3 h-3 bg-green-500 rounded-full animate-pulse';
        } else {
          statusText.innerText = 'متوقف';
          statusText.className = 'text-sm font-bold text-red-500';
          statusIndicator.className = 'w-3 h-3 bg-red-500 rounded-full';
        }
      }
    });
  </script>
</body>
</html>
